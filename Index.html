<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BM1 SWE Practice Quiz</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        h1 { color: #003366; text-align: center; }
        .quiz-container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .question { font-weight: bold; margin-bottom: 15px; font-size: 1.1em; }
        .options { margin-bottom: 20px; list-style-type: none; padding: 0; }
        .options li { background: #e9ecef; margin: 5px 0; padding: 10px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .options li:hover { background: #d3d9df; }
        .correct { background-color: #d4edda !important; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background-color: #f8d7da !important; color: #721c24; border: 1px solid #f5c6cb; }
        .btn { display: block; width: 100%; padding: 15px; background: #0055a4; color: white; text-align: center; border: none; border-radius: 5px; font-size: 1.1em; cursor: pointer; }
        .btn:hover { background: #003366; }
        #score { text-align: center; font-size: 1.2em; font-weight: bold; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>BM1 SWE Prep (30 Questions)</h1>
    <div id="quiz-body"></div>
    <button class="btn" onclick="checkAnswers()" id="submit-btn">Submit Exam</button>
    <div id="score"></div>
    <button class="btn" onclick="location.reload()" id="reload-btn" style="display:none; margin-top:10px;">Load New Exam</button>
</div>

<script>
    // ⬇️ ADD YOUR QUESTION BANK HERE ⬇️
    const questionBank = [
        {
            q: "What is the maximum towing capacity of the 47' MLB?",
            options: ["50 displacement tons", "100 displacement tons", "150 displacement tons", "200 displacement tons"],
            answer: 2 // Index of the correct option (0-based, so 2 = "150 displacement tons")
        },
        {
            q: "According to the Navigation Rules, a vessel restricted in her ability to maneuver shall exhibit which day shape?",
            options: ["Ball-Diamond-Ball", "Cylinder", "Diamond", "Three black balls"],
            answer: 0
        },
        {
            q: "Which manual governs the Coast Guard's Enlisted Professional Military Education (EPME)?",
            options: ["COMDTINST M1000.2", "COMDTINST M1510.2", "COMDTINST M1611.1", "COMDTINST M5000.3"],
            answer: 1
        },
        // Add all your hundreds of questions here following the same format...
    ];

    let currentQuestions = [];

    // Shuffle array function
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Initialize the quiz
    function loadQuiz() {
        // Randomize the main bank and pick the first 30 (or fewer if your bank is small)
        const shuffledBank = shuffle([...questionBank]);
        currentQuestions = shuffledBank.slice(0, 30); 

        const quizBody = document.getElementById('quiz-body');
        quizBody.innerHTML = '';

        currentQuestions.forEach((qObj, index) => {
            let questionHTML = `<div class="question-block" id="qb-${index}">
                <div class="question">${index + 1}. ${qObj.q}</div>
                <ul class="options">`;
            
            qObj.options.forEach((opt, optIndex) => {
                questionHTML += `<li>
                    <label>
                        <input type="radio" name="q${index}" value="${optIndex}">
                        ${opt}
                    </label>
                </li>`;
            });
            
            questionHTML += `</ul></div><hr>`;
            quizBody.innerHTML += questionHTML;
        });
    }

    function checkAnswers() {
        let score = 0;
        currentQuestions.forEach((qObj, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const options = document.querySelectorAll(`input[name="q${index}"]`);
            
            options.forEach(radio => {
                let li = radio.closest('li');
                if (parseInt(radio.value) === qObj.answer) {
                    li.classList.add('correct'); // Highlight the right answer in green
                }
            });

            if (selected && parseInt(selected.value) === qObj.answer) {
                score++;
            } else if (selected) {
                selected.closest('li').classList.add('incorrect'); // Highlight wrong selection in red
            }
        });

        document.getElementById('submit-btn').style.display = 'none';
        const scoreDiv = document.getElementById('score');
        scoreDiv.style.display = 'block';
        scoreDiv.innerHTML = `Your Score: ${score} / ${currentQuestions.length} (${Math.round((score/currentQuestions.length)*100)}%)`;
        document.getElementById('reload-btn').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    // Run when page loads
    window.onload = loadQuiz;
</script>
</body>
</html>
