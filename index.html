<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USCG BM SWE Study Tool</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #1c1e21; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        h1 { color: #003366; text-align: center; margin-bottom: 10px; }
        p.subtitle { text-align: center; color: #606770; margin-bottom: 30px; }
        
        /* Menu Styles */
        .menu-btn { display: block; width: 100%; padding: 20px; margin: 15px 0; font-size: 1.2em; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .bm1-btn { background-color: #0055a4; }
        .bmc-btn { background-color: #d9534f; }
        .menu-btn:hover { transform: scale(1.02); opacity: 0.9; }

        /* Quiz Styles */
        .question-block { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .question { font-weight: 600; margin-bottom: 12px; font-size: 1.1em; color: #003366; }
        .options { list-style: none; padding: 0; }
        .options li { background: #f8f9fa; margin: 8px 0; padding: 12px; border-radius: 6px; cursor: pointer; border: 1px solid #ddd; }
        .correct { background-color: #d4edda !important; border-color: #c3e6cb !important; color: #155724; }
        .incorrect { background-color: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24; }
        
        .action-btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
        #score-display { text-align: center; font-size: 1.5em; font-weight: bold; margin: 20px 0; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <!-- LANDING PAGE -->
    <div id="selection-screen">
        <h1>Coast Guard SWE Prep</h1>
        <p class="subtitle">Select your target rank to begin a random 30-question practice exam.</p>
        <button class="menu-btn bm1-btn" onclick="startQuiz('BM1')">Testing for BM1</button>
        <button class="menu-btn bmc-btn" onclick="startQuiz('BMC')">Testing for BMC</button>
    </div>

    <!-- QUIZ INTERFACE -->
    <div id="quiz-screen" class="hidden">
        <h1 id="quiz-title">Practice Exam</h1>
        <div id="quiz-body"></div>
        <button class="action-btn" id="submit-btn" onclick="checkAnswers()">Submit Exam</button>
        <div id="score-display"></div>
        <button class="action-btn" style="background:#0055a4;" onclick="location.reload()">Take Another Quiz</button>
    </div>
</div>

<script>
    // --- THE QUESTION DATABASE ---
    // Add your questions into these three categories.
    const questions = {
        common: [ // EPME and general BM knowledge for everyone
            { q: "What is the primary manual for USCG Boat Operations?", options: ["M16114.32", "M16130.2", "M5000.3", "M1000.6"], answer: 0 },
            { q: "Per 2025 EPME, what is the first step in the ORM process?", options: ["Identify Hazards", "Assess Risks", "Monitor", "Mission Analysis"], answer: 3 }
        ],
        BM1: [ // Specific to BM1 SWE
            { q: "What is the maximum sea state for a 29' RB-S?", options: ["4 feet", "6 feet", "8 feet", "10 feet"], answer: 1 },
            { q: "Which tool is used to track unit training and boat hours?", options: ["MISLE", "TMT", "DA", "CGBI"], answer: 1 }
        ],
        BMC: [ // Specific to BMC SWE (Chief level / OIC knowledge)
            { q: "As a prospective OIC, how many SWE points is the new board certification worth?", options: ["5 points", "10 points", "15 points", "20 points"], answer: 3 },
            { q: "A Chief Petty Officer's primary role in the mess is described as what?", options: ["Technical Expert", "The Backbone", "Lead Administrator", "Deck Supervisor"], answer: 1 }
        ]
    };

    let selectedQuestions = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startQuiz(rank) {
        // 1. Switch screens
        document.getElementById('selection-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        document.getElementById('quiz-title').innerText = `${rank} Practice Exam`;

        // 2. Combine Common questions + Rank Specific questions
        const fullBank = [...questions.common, ...questions[rank]];
        
        // 3. Shuffle and pick top 30 (or all if bank is smaller than 30)
        const shuffledBank = shuffle([...fullBank]);
        selectedQuestions = shuffledBank.slice(0, 30);

        // 4. Render
        const body = document.getElementById('quiz-body');
        body.innerHTML = '';
        selectedQuestions.forEach((qObj, i) => {
            let html = `<div class="question-block">
                <div class="question">${i+1}. ${qObj.q}</div>
                <ul class="options">`;
            qObj.options.forEach((opt, optIndex) => {
                html += `<li><label><input type="radio" name="q${i}" value="${optIndex}"> ${opt}</label></li>`;
            });
            html += `</ul></div>`;
            body.innerHTML += html;
        });
    }

    function checkAnswers() {
        let score = 0;
        selectedQuestions.forEach((q, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const options = document.querySelectorAll(`input[name="q${i}"]`);
            
            options.forEach(radio => {
                let li = radio.closest('li');
                if (parseInt(radio.value) === q.answer) li.classList.add('correct');
            });

            if (selected && parseInt(selected.value) === q.answer) {
                score++;
            } else if (selected) {
                selected.closest('li').classList.add('incorrect');
            }
        });

        const scoreDiv = document.getElementById('score-display');
        scoreDiv.style.display = 'block';
        scoreDiv.innerHTML = `Final Score: ${score} / ${selectedQuestions.length}`;
        document.getElementById('submit-btn').classList.add('hidden');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
