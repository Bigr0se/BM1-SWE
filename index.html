    let currentQuestions = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function loadQuiz() {
        // 1. Shuffle the entire master bank
        const shuffled = shuffle([...masterBank]);
        
        // 2. Pick exactly 10 questions
        currentQuestions = shuffled.slice(0, 10);

        // 3. Render them to the screen
        const body = document.getElementById('quiz-body');
        body.innerHTML = '';
        currentQuestions.forEach((qObj, i) => {
            let html = `<div class="question-block">
                <div class="question">${i+1}. ${qObj.q}</div>
                <ul class="options">`;
            qObj.options.forEach((opt, optIndex) => {
                html += `<li><label><input type="radio" name="q${i}" value="${optIndex}"> ${opt}</label></li>`;
            });
            html += `</ul></div>`;
            body.innerHTML += html;
        });
    }

    function checkAnswers() {
        let score = 0;
        currentQuestions.forEach((q, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const options = document.querySelectorAll(`input[name="q${i}"]`);
            
            options.forEach(radio => {
                let li = radio.closest('li');
                if (parseInt(radio.value) === q.answer) {
                    li.classList.add('correct'); // Show the right answer in green
                }
            });

            if (selected && parseInt(selected.value) === q.answer) {
                score++;
            } else if (selected) {
                selected.closest('li').classList.add('incorrect'); // Show wrong answer in red
            }
        });

        // Show score and toggle buttons
        const scoreDiv = document.getElementById('score-display');
        scoreDiv.style.display = 'block';
        scoreDiv.innerHTML = `Score: ${score} / 10`;
        
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('reload-btn').style.display = 'block';
        
        window.scrollTo(0, 0); // Jump back to top to see score
    }

    // Auto-load on page start
    window.onload = loadQuiz;
</script>
